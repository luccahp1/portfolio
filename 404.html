<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>404 - lucca prada</title>
  <!-- absolute URL: github pages serves this 404 at any depth -->
  <link rel="icon" href="https://luccahp1.github.io/portfolio/favicon.svg" type="image/svg+xml">
  <style>
    :root { --paper:#f7f3ea; --ink:#201c17; --soft:#5f5749; --pen:#2b50c8; }
    @media (prefers-color-scheme: dark) {
      :root { --paper:#141110; --ink:#ece5d6; --soft:#a1988a; --pen:#92a9f5; }
    }
    body {
      margin:0; min-height:100vh; display:grid; place-items:center;
      background:var(--paper); color:var(--ink);
      font:400 1.05rem/1.6 system-ui, sans-serif; text-align:center; padding:2rem;
    }
    h1 { font-family:Georgia, serif; font-size:3rem; margin:0 0 .4rem; }
    p { color:var(--soft); margin:.3rem 0; }
    a { color:var(--pen); text-underline-offset:3px; }
    a:hover { text-decoration-style:wavy; }
    .hand { font-family:"Caveat","Segoe Script",cursive; font-size:1.3rem; }
    svg { display:block; margin:0 auto 1rem; opacity:.6; }
    svg path { fill:var(--paper); stroke:var(--soft); stroke-width:1.3; }
  </style>
</head>
<body>
  <main>
    <svg width="17" height="22" viewBox="0 0 17 22" aria-hidden="true">
      <path d="M1 1 L1 16.5 L5.2 12.8 L7.6 19 L10.4 17.9 L8 11.9 L14 11.6 Z"/>
    </svg>
    <h1>404</h1>
    <p>this page doesn't exist. i checked twice.</p>
    <p class="hand">even the ghost has never been here.</p>
    <p><a href="https://luccahp1.github.io/portfolio/">← back to the real page</a></p>
  </main>
</body>
</html>
